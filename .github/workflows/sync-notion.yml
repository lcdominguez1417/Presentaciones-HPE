name: Sync presentaciones → Notion

on:
  push:
    branches: [main]
    paths:
      - "presentations/**/slides.html"
      - "presentations/**/content.md"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Sync to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python lib/sync_notion.py
